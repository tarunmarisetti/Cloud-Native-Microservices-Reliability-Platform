spring.application.name=config-server
server.port=8071

#injecting configurations using classpath
#spring.cloud.config.server.native.search-locations:classpath:/config

#injecting configurations using filepath
#spring.cloud.config.server.native.search-locations:file:///c//users//tarun//config

spring.profiles.active=git

#centralised config server
spring.cloud.config.server.git.uri=https://github.com/tarunmarisetti/MicroservicesDocker.git

#cloning the Github repo on run time
spring.cloud.config.server.git.clone-on-start=true

#pointing to main branch
spring.cloud.config.server.git.default-label=main

#should try to get the configuration with in 5 seconds
spring.cloud.config.server.git.timeout=5

spring.cloud.config.server.git.force.pull=true

encrypt.key=SDXYFCUGVH5678hnjkm

#actuator
management.endpoints.web.exposure.include=*
management.health.readiness-state.enabled=true
management.health.liveness-state.enabled=true
management.endpoint.health.probes.enabled=true

#metrics
management.metrics.tags.application=${spring.application.name}

#distributed tracing
logging.pattern.level= %5p[${spring.application.name:-},%X{trace_id:-},%X{span_id:-}]