spring.application.name=department

spring.datasource.url=jdbc:mysql://host.docker.internal:3306/department
spring.datasource.username=root
spring.datasource.password=TM@rootuser
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect



spring.profiles.active=prod

#define the link for the config server note we need to define the spring.application.name
spring.config.import=optional:configserver:http://localhost:8071

# actuator
management.endpoints.web.exposure.include=*
management.info.env.enabled=true
management.endpoint.shutdown.enabled=true

# health checks
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.liveness-state.enabled=true
management.health.readiness-state.enabled=true

#metrics
management.metrics.tags.application=${spring.application.name}

#service registry and discovery

eureka.instance.preferIpAddress=True
eureka.client.service-url.defaultZone=http://localhost:8070/eureka

info.app.name=department
info.app.description=department service
info.app.version=1.0.0

logging.level.com.department_service=DEBUG
#distributed tracing
logging.pattern.level= %5p[${spring.application.name:-},%X{trace_id:-},%X{span_id:-}]

